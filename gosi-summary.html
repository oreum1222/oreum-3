<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0b08">
<title>고전시가 주요 구절 및 고사 총정리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0b08;
  --bg-card:#16130e;
  --bg-card-hover:#1c1812;
  --hanji:#f0e8d4;
  --hanji-dim:#c8bfa8;
  --vermilion:#c4513a;
  --vermilion-soft:rgba(196,81,58,.08);
  --teal:#3a9a8a;
  --teal-bright:#50c4b0;
  --teal-soft:rgba(58,154,138,.08);
  --indigo:#7a6aaa;
  --indigo-bright:#a08cd4;
  --indigo-soft:rgba(122,106,170,.08);
  --gold:#b8943e;
  --gold-bright:#d4ad4a;
  --gold-dim:#8a7030;
  --gold-ghost:rgba(184,148,62,.06);
  --pine:#5a7a4a;
  --pine-dim:#3a5a30;
  --ink:#e8e0d0;
  --ink-mid:#a09880;
  --ink-soft:#706858;
  --ink-ghost:#403828;
  --divider:rgba(184,148,62,.12);
}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--gold-dim) var(--bg)}
body{
  background:var(--bg);color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
  word-break:keep-all;line-height:1.8;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ═══ Hero ═══ */
.hero{
  min-height:100vh;min-height:100svh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;position:relative;padding:40px 24px;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 40% at 50% 45%,rgba(184,148,62,.06),transparent),
    radial-gradient(ellipse 80% 60% at 50% 100%,rgba(13,11,8,.9),transparent);
  pointer-events:none;
}
.hero-orn{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:40px;opacity:0;animation:fu .8s .3s forwards}
.hero-badge{font-family:'Noto Serif KR',serif;font-size:11px;letter-spacing:6px;color:var(--gold-dim);margin-bottom:28px;opacity:0;animation:fu .8s .5s forwards}
.hero-title{
  font-family:'Noto Serif KR',serif;font-size:clamp(40px,9vw,72px);font-weight:900;
  color:var(--hanji);letter-spacing:10px;line-height:1.3;opacity:0;animation:fu 1s .7s forwards;
}
.hero-title .hl{
  display:inline;
  background:linear-gradient(180deg,var(--hanji) 40%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-sub{font-family:'Noto Serif KR',serif;font-size:clamp(13px,2vw,16px);font-weight:300;color:var(--ink-mid);letter-spacing:3px;margin-top:14px;opacity:0;animation:fu .8s .9s forwards}
.hero-works{
  display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-top:40px;opacity:0;animation:fu .8s 1.1s forwards;
}
.hero-chip{
  font-family:'Noto Serif KR',serif;font-size:13px;letter-spacing:2px;
  color:var(--ink-soft);padding:8px 20px;
  border:1px solid var(--divider);border-radius:2px;
  cursor:pointer;transition:.3s;text-decoration:none;
}
.hero-chip:hover{color:var(--gold-bright);border-color:var(--gold)}
.hero-brand{font-size:11px;letter-spacing:5px;color:var(--ink-soft);margin-top:36px;opacity:0;animation:fu .8s 1.3s forwards}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fu .8s 1.5s forwards}
.hero-scroll span{font-size:10px;letter-spacing:3px;color:var(--ink-soft)}
.scroll-line{width:1px;height:40px;background:linear-gradient(180deg,var(--gold-dim),transparent);animation:pulse 2s infinite}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* ═══ Work divider ═══ */
.work-divider{
  position:relative;padding:100px 24px 60px;text-align:center;
  max-width:720px;margin:0 auto;
}
.work-divider::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:1px;height:60px;
  background:linear-gradient(180deg,transparent,var(--gold-dim));
}
.wd-num{
  font-family:'Noto Serif KR',serif;font-size:12px;letter-spacing:8px;
  color:var(--gold-dim);margin-bottom:20px;
}
.wd-title{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(30px,7vw,52px);font-weight:900;
  letter-spacing:8px;line-height:1.3;
  background:linear-gradient(180deg,var(--hanji) 30%,var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;
}
.wd-meta{
  font-size:12px;letter-spacing:3px;color:var(--ink-soft);margin-bottom:8px;
}
.wd-desc{
  font-family:'Noto Serif KR',serif;font-size:14px;font-weight:300;
  color:var(--ink-mid);max-width:480px;margin:16px auto 0;line-height:1.9;
}
.wd-line{width:40px;height:1px;margin:28px auto 0;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}

/* ═══ TOC ═══ */
.toc{max-width:680px;margin:0 auto;padding:40px 24px 50px;border-bottom:1px solid var(--divider)}
.toc-label{font-size:10px;letter-spacing:5px;color:var(--gold-dim);margin-bottom:20px}
.toc-item{
  display:flex;align-items:baseline;gap:14px;padding:10px 0;
  border-bottom:1px solid rgba(184,148,62,.05);
  cursor:pointer;transition:.3s;text-decoration:none;color:inherit;
}
.toc-item:last-child{border-bottom:none}
.toc-item:hover{padding-left:8px}
.toc-item:hover .toc-num{color:var(--gold-bright)}
.toc-item:hover .toc-name{color:var(--hanji)}
.toc-num{font-family:'Noto Serif KR',serif;font-size:12px;font-weight:600;color:var(--ink-soft);min-width:18px;transition:color .3s}
.toc-name{font-family:'Noto Serif KR',serif;font-size:14px;color:var(--ink-mid);transition:color .3s}
.toc-dot{flex:1;border-bottom:1px dotted var(--ink-ghost);margin:0 8px;min-width:16px;align-self:center}

/* ═══ Entries ═══ */
.main{max-width:720px;margin:0 auto;padding:0 24px}
.entry{
  padding:72px 0;border-bottom:1px solid var(--divider);
  opacity:0;transform:translateY(30px);transition:opacity .7s,transform .7s;
}
.entry.visible{opacity:1;transform:translateY(0)}
.entry:last-child{border-bottom:none}

.entry-head{margin-bottom:36px;position:relative}
.entry-num{
  font-family:'Noto Serif KR',serif;font-size:clamp(56px,11vw,88px);font-weight:200;
  color:var(--ink-ghost);line-height:1;position:absolute;top:-16px;left:-6px;user-select:none;
}
.entry-title{
  font-family:'Noto Serif KR',serif;font-size:clamp(20px,3.6vw,26px);font-weight:600;
  color:var(--hanji);padding-left:clamp(40px,7vw,58px);padding-top:22px;line-height:1.5;
}

.quote{
  position:relative;margin:0 0 32px;padding:28px 0 28px 24px;
  border-left:2px solid var(--gold-dim);
}
.quote::before{
  content:'';position:absolute;left:-1px;top:0;width:2px;height:0;
  background:var(--gold-bright);transition:height 1.2s cubic-bezier(.23,1,.32,1);
}
.entry.visible .quote::before{height:100%}
.quote-tag{
  font-size:9px;letter-spacing:5px;color:var(--gold-dim);
  margin-bottom:12px;display:flex;align-items:center;gap:10px;
}
.quote-tag::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--divider),transparent)}
.quote p{
  font-family:'Noto Serif KR',serif;font-size:clamp(15px,2.6vw,18px);font-weight:400;
  color:var(--hanji);line-height:2.2;letter-spacing:.3px;
}
.quote .sl{display:inline-block;color:var(--gold-dim);margin:0 4px;font-weight:300}

.point{margin-bottom:28px}
.point-tag{
  font-size:9px;letter-spacing:5px;color:var(--pine);
  margin-bottom:10px;display:flex;align-items:center;gap:10px;
}
.point-tag::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(90,122,74,.2),transparent)}
.point p{font-size:14.5px;color:var(--ink-mid);line-height:2}
.point em{font-style:normal;color:var(--hanji-dim);border-bottom:1px solid var(--gold-ghost)}

.summary{
  display:flex;gap:14px;padding:16px 20px;
  background:var(--gold-ghost);border:1px solid var(--divider);border-radius:3px;
  position:relative;overflow:hidden;
}
.summary::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--gold-dim))}
.summary-badge{
  font-family:'Noto Serif KR',serif;font-size:10px;letter-spacing:3px;
  color:var(--gold);white-space:nowrap;padding-top:2px;
}
.summary p{font-size:13.5px;color:var(--gold-bright);line-height:1.8;font-weight:500}

/* ═══ Vermilion accent for 속사미인곡 ═══ */
.work-v .quote{border-left-color:var(--vermilion)}
.work-v .quote::before{background:var(--vermilion)}
.work-v .quote-tag{color:rgba(196,81,58,.5)}
.work-v .quote-tag::after{background:linear-gradient(90deg,rgba(196,81,58,.15),transparent)}
.work-v .summary{background:var(--vermilion-soft);border-color:rgba(196,81,58,.12)}
.work-v .summary::before{background:linear-gradient(180deg,var(--vermilion),rgba(196,81,58,.4))}
.work-v .summary-badge{color:var(--vermilion)}
.work-v .summary p{color:rgba(220,120,100,1)}
.work-v .point-tag{color:rgba(196,81,58,.5)}
.work-v .point-tag::after{background:linear-gradient(90deg,rgba(196,81,58,.12),transparent)}

/* ═══ Teal accent for 유산가 ═══ */
.work-t .quote{border-left-color:var(--teal)}
.work-t .quote::before{background:var(--teal-bright)}
.work-t .quote-tag{color:rgba(58,154,138,.5)}
.work-t .quote-tag::after{background:linear-gradient(90deg,rgba(58,154,138,.15),transparent)}
.work-t .summary{background:var(--teal-soft);border-color:rgba(58,154,138,.12)}
.work-t .summary::before{background:linear-gradient(180deg,var(--teal),rgba(58,154,138,.4))}
.work-t .summary-badge{color:var(--teal)}
.work-t .summary p{color:var(--teal-bright)}
.work-t .point-tag{color:rgba(58,154,138,.6)}
.work-t .point-tag::after{background:linear-gradient(90deg,rgba(58,154,138,.15),transparent)}

/* ═══ Indigo accent for 백석정별곡 ═══ */
.work-i .quote{border-left-color:var(--indigo)}
.work-i .quote::before{background:var(--indigo-bright)}
.work-i .quote-tag{color:rgba(122,106,170,.5)}
.work-i .quote-tag::after{background:linear-gradient(90deg,rgba(122,106,170,.15),transparent)}
.work-i .summary{background:var(--indigo-soft);border-color:rgba(122,106,170,.12)}
.work-i .summary::before{background:linear-gradient(180deg,var(--indigo),rgba(122,106,170,.4))}
.work-i .summary-badge{color:var(--indigo)}
.work-i .summary p{color:var(--indigo-bright)}
.work-i .point-tag{color:rgba(122,106,170,.6)}
.work-i .point-tag::after{background:linear-gradient(90deg,rgba(122,106,170,.15),transparent)}

/* ═══ Side nav ═══ */
.side-nav{
  position:fixed;right:22px;top:50%;transform:translateY(-50%);
  z-index:100;display:flex;flex-direction:column;align-items:center;gap:6px;
}
.sn-label{
  font-size:8px;letter-spacing:2px;color:var(--ink-soft);
  writing-mode:vertical-rl;margin-bottom:4px;
  transform:rotate(180deg);
}
.sn-gap{height:12px;width:1px;background:var(--divider)}
.sn-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.15);border:none;cursor:pointer;
  transition:.4s cubic-bezier(.23,1,.32,1);position:relative;
}
.sn-dot.active{background:rgba(255,255,255,.85);transform:scale(1.5)}
.sn-dot.active.v{background:rgba(196,81,58,.9)}
.sn-dot.active.t{background:rgba(58,154,138,.9)}
.sn-dot.active.i{background:rgba(122,106,170,.9)}
.sn-dot::after{
  content:attr(data-tip);position:absolute;right:16px;top:50%;transform:translateY(-50%);
  font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.45);
  white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;
}
.sn-dot:hover::after{opacity:1}

/* ═══ Progress & BTT ═══ */
.progress{position:fixed;top:0;left:0;right:0;height:2px;z-index:200}
.progress-bar{height:100%;width:0;background:linear-gradient(90deg,var(--gold-dim),var(--gold-bright));transition:width .15s}
.btt{
  position:fixed;bottom:28px;right:28px;z-index:100;
  width:40px;height:40px;border:1px solid var(--divider);border-radius:50%;
  background:var(--bg-card);display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transform:translateY(10px);transition:.4s;
}
.btt.show{opacity:1;transform:translateY(0)}
.btt:hover{border-color:var(--gold);background:var(--bg-card-hover)}
.btt svg{width:14px;height:14px;color:var(--ink-mid)}

/* ═══ Footer ═══ */
.foot{max-width:680px;margin:0 auto;padding:80px 24px 60px;text-align:center}
.foot-line{width:40px;height:1px;margin:0 auto 32px;background:linear-gradient(90deg,transparent,var(--gold-dim),transparent)}
.foot-brand{font-family:'Noto Serif KR',serif;font-size:12px;letter-spacing:6px;color:var(--gold-dim);margin-bottom:20px}
.foot-warn{font-size:11px;color:var(--ink-soft);line-height:2;max-width:480px;margin:0 auto}

/* ═══ Responsive ═══ */
@media(max-width:640px){
  .side-nav{display:none}
  .entry{padding:40px 0}
  .entry-num{font-size:42px;top:-8px}
  .entry-title{padding-left:32px;padding-top:14px}
  .entry-title h3{font-size:1.05rem}
  .quote{padding:16px 0 16px 16px}
  .quote p{font-size:.92rem;line-height:1.9}
  .summary{flex-direction:column;gap:6px}
  .summary-item{font-size:.82rem}
  .toc{padding:28px 20px 32px}
  .toc-title{font-size:1rem}
  .toc-list{gap:6px}
  .toc-item{font-size:.82rem;padding:12px 14px;min-height:44px}
  .hero-works{flex-direction:column;gap:12px;align-items:center}
  .hero-title{font-size:clamp(1.6rem,6vw,2.4rem)}
  .hero-sub{font-size:.85rem}
  .work-divider{padding:60px 20px 36px}
  .wd-title{letter-spacing:4px;font-size:1.4rem}
  .wd-sub{font-size:.78rem}
  .btt{bottom:16px;right:16px;width:36px;height:36px;font-size:14px}
  .main{padding:0 18px}
  .foot{padding:60px 18px 40px}
  .foot-warn{font-size:10px}
  .anno{font-size:.78rem;padding:10px 14px}
  .hero{padding:60px 18px 36px;min-height:auto}
}
@media(max-width:380px){
  .entry-num{font-size:36px}
  .entry-title{padding-left:28px}
  .quote p{font-size:.88rem}
  .hero{padding:48px 14px 28px}
  .main{padding:0 14px}
}
@media print{
  .hero{min-height:auto;padding:40px 24px}
  .side-nav,.progress,.btt,.hero-scroll{display:none}
  .entry{opacity:1!important;transform:none!important;padding:28px 0;page-break-inside:avoid}
  .work-divider{padding:48px 24px 28px;page-break-before:always}
  body::after{display:none}
  body{background:#fff;color:#1a1a1a}
  .hero-title .hl,.wd-title{-webkit-text-fill-color:#1a1a1a;color:#1a1a1a}
  .quote p,.entry-title{color:#1a1a1a}
}
</style>
</head>
<body>

<div class="progress"><div class="progress-bar" id="prog"></div></div>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <div class="hero-orn"></div>
  <div class="hero-badge">가사 · 잡가 · 정리 노트</div>
  <h1 class="hero-title"><span class="hl">고전시가</span></h1>
  <p class="hero-sub">주요 구절 및 고사 총정리</p>
  <div class="hero-works">
    <a class="hero-chip" href="#work1">一 사친가</a>
    <a class="hero-chip" href="#work2">二 속사미인곡</a>
    <a class="hero-chip" href="#work3">三 유산가</a>
    <a class="hero-chip" href="#work4">四 백석정별곡</a>
  </div>
  <p class="hero-brand">[오름] 국어 · 가경T</p>
  <div class="hero-scroll"><span>SCROLL</span><div class="scroll-line"></div></div>
</section>

<div id="content"></div>

<footer class="foot">
  <div class="foot-line"></div>
  <div class="foot-brand">[오름] 국어</div>
  <p class="foot-warn">
    본 자료는 오직 [오름] 국어 학원 수강생들의 성적 향상을 위해 제작된 비매품입니다.<br>
    무단 배포 적발 시 즉각적인 퇴원 조치 및 강력한 법적 조치를 취합니다.
  </p>
</footer>

<nav class="side-nav" id="sideNav"></nav>
<button class="btt" id="btt" onclick="scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 12V2m0 0L2 7m5-5l5 5"/></svg>
</button>

<script>
const WORKS=[
{
  id:"work1",num:"一",title:"사친가",
  genre:"가사",author:"정철 (미상설 있음)",
  desc:"부모 잃은 자식의 사무치는 효심을 사계절의 세시풍속과 중국 고사에 빗대어 노래한 가사",
  accent:"gold",
  items:[
    {n:"1",t:"한식(寒食)의 유래와 대조",
    q:"원산(遠山)에 봄이 드니 불탄 풀에 속잎 난다 / 후인들이 슬퍼하여 한식을 지었도다",
    p:"불에 타 죽은 개자추를 기리는 '한식'의 유래를 인용하며, <em>다시 살아나는 자연(속잎)</em>과 돌아오지 못하는 부모님을 대비시킵니다.",
    s:"불탄 풀의 새잎 ↔ 부모님의 죽음 — 자연의 순환과 인간의 유한함 대비"},
    {n:"2",t:"인생무상과 영웅의 허무함",
    q:"당우삼대 성제들도 승피백운 하셨도다 / 여산 송백 무릉 춘초는 만고영웅 일과처라",
    p:"요·순임금 같은 성군과 천하를 호령하던 영웅들도 결국 죽음을 피하지 못하고 무덤 속 한 줌 흙이 되었다는 <em>인생무상</em>을 노래합니다.",
    s:"성군과 영웅의 죽음 = 아무리 위대한 존재도 죽음 앞에서는 평등함"},

WORKS.forEach((w,wi)=>{
  // Work divider
  const div=document.createElement('div');
  div.className='work-divider';div.id=w.id;
  div.innerHTML=`
    <div class="wd-num">${w.num}</div>
    <div class="wd-title">${w.title}</div>
    <div class="wd-meta">${w.genre} · ${w.author}</div>
    <p class="wd-desc">${w.desc}</p>
    <div class="wd-line"></div>`;
  container.appendChild(div);

  // TOC for this work
  const toc=document.createElement('nav');
  toc.className='toc';
  let tocHTML=`<div class="toc-label">${w.title} 목차</div>`;
  w.items.forEach(d=>{
    tocHTML+=`<a class="toc-item" href="#${w.id}_${d.n}">
      <span class="toc-num">${d.n}</span><span class="toc-name">${d.t}</span><span class="toc-dot"></span></a>`;
  });
  toc.innerHTML=tocHTML;
  container.appendChild(toc);

  // Side nav label
  const label=document.createElement('div');
  label.className='sn-label';label.textContent=w.title;
  if(wi>0){const gap=document.createElement('div');gap.className='sn-gap';sideNav.appendChild(gap)}
  sideNav.appendChild(label);

  // Main section
  const main=document.createElement('main');
  const accentClass=w.accent==='vermilion'?' work-v':w.accent==='teal'?' work-t':w.accent==='indigo'?' work-i':'';
  main.className='main'+accentClass;

  w.items.forEach(d=>{
    const qHTML=d.q.replace(/ \/ /g,' <span class="sl">/</span> ');
    const el=document.createElement('article');
    el.className='entry';el.id=`${w.id}_${d.n}`;
    el.innerHTML=`
      <div class="entry-head">
        <div class="entry-num">${d.n}</div>
        <h2 class="entry-title">${d.t}</h2>
      </div>
      <div class="quote">
        <div class="quote-tag">구 절</div>
        <p>${qHTML}</p>
      </div>
      <div class="point">
        <div class="point-tag">핵심 포인트</div>
        <p>${d.p}</p>
      </div>
      <div class="summary">
        <span class="summary-badge">요약</span>
        <p>${d.s}</p>
      </div>`;
    main.appendChild(el);
    allEntries.push(el);

    // Side dot
    const dot=document.createElement('button');
    dot.className='sn-dot'+(w.accent==='vermilion'?' v':w.accent==='teal'?' t':w.accent==='indigo'?' i':'');
    dot.dataset.tip=d.t.length>8?d.t.slice(0,8)+'…':d.t;
    dot.onclick=()=>el.scrollIntoView({behavior:'smooth',block:'start'});
    sideNav.appendChild(dot);
    allDots.push(dot);
  });

  container.appendChild(main);
});

// Observers
const revealObs=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')});
},{threshold:.12});
allEntries.forEach(e=>revealObs.observe(e));

const activeObs=new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(e.isIntersecting){
      const idx=allEntries.indexOf(e.target);
      allDots.forEach((d,i)=>d.classList.toggle('active',i===idx));
    }
  });
},{rootMargin:'-35% 0px -55% 0px'});
allEntries.forEach(e=>activeObs.observe(e));

// Progress & BTT
const prog=document.getElementById('prog');
const btt=document.getElementById('btt');
window.addEventListener('scroll',()=>{
  const h=document.documentElement;
  const pct=h.scrollTop/(h.scrollHeight-h.clientHeight)*100;
  prog.style.width=pct+'%';
  btt.classList.toggle('show',h.scrollTop>600);
},{passive:true});
</script>
</body>
</html>
