<title>수능특강 고전소설 인물관계도</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0a0a10;
  min-height:100vh;
  font-family:'Noto Sans KR',sans-serif;
  color:#e8e4dc;
  display:flex;flex-direction:column;align-items:center;
}

/* ===== HEADER ===== */
.hdr{text-align:center;padding:28px 10px 0;}
.hdr h1{font-family:'Noto Serif KR',serif;font-weight:900;font-size:clamp(20px,3.5vw,32px);color:#fff;}
.hdr h1 em{font-style:normal;color:#ff6b4a;}
.hdr .sub{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:4px;font-weight:300;margin-top:4px;}

/* ===== TABS ===== */
.tabs{
  display:flex;gap:0;margin:20px auto 0;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:12px;overflow:hidden;
  background:rgba(255,255,255,0.03);
}
.tab{
  padding:12px 28px;
  font-family:'Noto Serif KR',serif;
  font-weight:700;font-size:14px;
  color:rgba(255,255,255,0.35);
  cursor:pointer;
  transition:all 0.25s;
  border-right:1px solid rgba(255,255,255,0.06);
  position:relative;
  white-space:nowrap;
}
.tab:last-child{border-right:none;}
.tab:hover{color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.03);}
.tab.on{
  color:#ff6b4a;
  background:rgba(255,107,74,0.08);
}
.tab.on::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;
  background:#ff6b4a;border-radius:1px;
  box-shadow:0 0 8px rgba(255,107,74,0.5);
}

/* ===== PANELS ===== */
.panel{display:none;width:100%;max-width:1350px;padding:10px 10px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.panel.on{display:block;}
svg text{font-family:'Noto Sans KR',sans-serif;}

/* ===== TOOLTIP ===== */
.tip-bg{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.4);}
.tip-bg.on{display:block;}
.tip{
  position:fixed;z-index:1000;
  background:#16161e;color:#e0dcd4;
  border:1px solid rgba(255,107,74,0.35);border-radius:10px;
  padding:16px 18px;width:290px;
  box-shadow:0 0 30px rgba(255,107,74,0.12),0 10px 40px rgba(0,0,0,0.5);
  font-size:12.5px;line-height:1.8;font-weight:300;
  pointer-events:none;
}
.tip b{display:block;font-family:'Noto Serif KR',serif;font-weight:700;font-size:14px;color:#ff6b4a;margin-bottom:6px;}

/* ===== LEGEND ===== */
.legend{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;padding:14px 10px;}
.legend i{display:inline-block;width:22px;height:3px;border-radius:2px;vertical-align:middle;margin-right:5px;}
.legend span{font-size:11px;color:rgba(255,255,255,0.4);}

.ft{text-align:center;padding:16px 10px 32px;font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;font-weight:300;}
.ft b{color:#ff6b4a;font-weight:600;}

@media(max-width:600px){
  .tab{padding:10px 16px;font-size:12px;}
}
</style>
</head>

<!-- TOOLTIP -->
<div class="tip-bg" id="tBg"><div class="tip" id="tBox"></div></div>

<script>
// tabs
const tabs=document.querySelectorAll('.tab');
const panels=[document.getElementById('p0'),document.getElementById('p1'),document.getElementById('p2')];
tabs.forEach(t=>{
  t.addEventListener('click',()=>{
    tabs.forEach(x=>x.classList.remove('on'));
    panels.forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    panels[+t.dataset.t].classList.add('on');
    bg.classList.remove('on');
  });
});

// tooltip
const bg=document.getElementById('tBg'),box=document.getElementById('tBox');
document.querySelectorAll('.p').forEach(g=>{
  g.style.cursor='pointer';
  g.addEventListener('click',e=>{
    e.stopPropagation();
    box.innerHTML=`<b>${g.dataset.n}</b>${g.dataset.d}`;
    bg.classList.add('on');
    const c=g.querySelector('circle'),r=c.getBoundingClientRect();
    let l=r.left+r.width/2-145,t=r.top-12;
    t=(t-160>0)?t-160:r.bottom+10;
    if(l<6)l=6;if(l+290>innerWidth)l=innerWidth-296;
    box.style.left=l+'px';box.style.top=t+'px';
  });
});
bg.onclick=()=>bg.classList.remove('on');
document.onkeydown=e=>{if(e.key==='Escape')bg.classList.remove('on');};
</script>
